apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    source-file: nginx2-HelmRelease-resource.yaml
  name: nginx2
  namespace: nginx2
spec:
  chart:
    spec:
      chart: nginx
      sourceRef:
        kind: HelmRepository
        name: btinami
        namespace: nginx2
      version: 15.x
  interval: 5m0s
  targetNamespace: nginx2
  values:
    service:
      type: ClusterIP
